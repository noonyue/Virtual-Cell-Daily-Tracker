name: Daily Virtual Cell Paper Fetcher

on:
  schedule:
    # GitHub Actions 使用 UTC 时间。北京时间 20:00 减去 8 小时，即 UTC 时间 12:00。
    - cron: '0 12 * * *'
  # workflow_dispatch 允许我们在 GitHub 网页端手动点击按钮来立即运行测试，无需干等
  workflow_dispatch: 

jobs:
  fetch_and_save:
    runs-on: ubuntu-latest
    permissions:
      contents: write # 赋予 Action 向您的仓库写入（上传）CSV 文件的权限

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests pandas

    - name: Run fetch script
      run: python fetch_papers.py

    - name: Commit and push CSV file
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add *.csv
        # 捕获没有新文献时不报错的异常
        git commit -m "Auto-add daily paper report [skip ci]" || echo "No new papers to commit"
        git push
